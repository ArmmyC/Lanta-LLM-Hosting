services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-3000}:8080"
    environment:
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-http://litellm:4000/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-change-this-master-key}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-change-this-openwebui-secret}
      ENABLE_OLLAMA_API: "false"
    volumes:
      - openwebui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  openwebui-data:

networks:
  default:
    name: lanta-llm-platform
