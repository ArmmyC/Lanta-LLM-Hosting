model_list:
  - model_name: active-lanta-model
    litellm_params:
      # Public callers keep using "active-lanta-model".
      # Change VLLM_MODEL_ID in litellm/.env when the vLLM served model changes.
      # The value must include LiteLLM's provider prefix, for example:
      #   VLLM_MODEL_ID=openai/qwen36-27b
      model: os.environ/VLLM_MODEL_ID
      api_base: os.environ/VLLM_BASE_URL
      api_key: os.environ/VLLM_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL
  store_model_in_db: true
  allow_user_auth: true

litellm_settings:
  callbacks: ["prometheus"]
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  set_verbose: false
  drop_params: true

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  timeout: 300
